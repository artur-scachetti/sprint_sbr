/**:
  ekf_filter:
    ros__parameters:
      use_sim_time: true
      frequency: 30.0
      two_d_mode: true
      publish_tf: true
      print_diagnostics: true

      imu0: imu
      imu0_config: [false, false, false,
                    true,  true,  true,
                    false, false, false,
                    true,  true,  true,
                    true,  true,  true]
      imu0_nodelay: false
      imu0_differential: false
      imu0_relative: false

      odom0: odometry/gps
      odom0_config: [true,  true,  false,
                     false, false, false,
                     false, false, false,
                     false, false, false,
                     false, false, false]
      odom0_differential: false
      odom0_relative: false

  navsat_transform:
    ros__parameters:
      use_sim_time: true
      frequency: 30.0
      magnetic_declination_radians: 0.0
      yaw_offset: 0.0 
      zero_altitude: true
      broadcast_cartesian_transform: false
      publish_filtered_gps: false
      use_odometry_yaw: false
      wait_for_datum: false